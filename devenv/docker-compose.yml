# Docker Compose configuration for Persona (Local Development)
#
# Usage: docker compose up
#
# This runs Persona in Docker for local development.
# Use ./scripts/start.sh to run MoronList services directly.

services:
  # Persona Server (Authentication)
  persona-server:
    image: ghcr.io/agilehead/persona:latest
    container_name: persona-server
    ports:
      - "127.0.0.1:6005:6005"
    env_file:
      - ${ENV_FILE:-../.env}
    environment:
      # Container-specific paths and hosts (override values from env_file)
      - NODE_ENV=development
      - PERSONA_SERVER_HOST=0.0.0.0
      - PERSONA_SERVER_PORT=6005
      - PERSONA_SERVER_PUBLIC_URL=http://localhost:6005
      - PERSONA_DATA_DIR=/app/data/persona/db
      - PERSONA_LOG_FILE_DIR=/app/data/persona/logs
      - PERSONA_TENANT_MODE=single
      - PERSONA_TENANTS=moronlist
      - PERSONA_AUTO_MIGRATE=true
    volumes:
      - persona_data:/app/data/persona/db
      - persona_logs:/app/data/persona/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:6005/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  persona_data:
  persona_logs:
